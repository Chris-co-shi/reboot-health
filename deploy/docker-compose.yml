services:
  backend:
    build:
      context: ../backend
    container_name: reboot-health-backend
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/reboot_health}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-reboot_health}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-reboot_health}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      APP_AI_BASE_URL: ${APP_AI_BASE_URL:-https://api.openai.com/v1}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-}
      APP_AI_MODEL: ${APP_AI_MODEL:-gpt-4.1-mini}
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
    container_name: reboot-health-frontend
    depends_on:
      - backend
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:3000:80"
