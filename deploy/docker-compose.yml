services:
  agent-runtime:
    build:
      context: ../agent-runtime
    container_name: reboot-health-agent-runtime
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:8090:8090"

  backend:
    build:
      context: ../backend
    container_name: reboot-health-backend
    depends_on:
      - agent-runtime
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/reboot_health}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-reboot_health}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change-me}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      APP_AGENT_RUNTIME_BASE_URL: ${APP_AGENT_RUNTIME_BASE_URL:-http://agent-runtime:8090}
      APP_AGENT_RUNTIME_TIMEOUT_MILLIS: ${APP_AGENT_RUNTIME_TIMEOUT_MILLIS:-3000}
      APP_DEVICE_CREDENTIAL_ENVELOPE_KEY_BASE64: ${APP_DEVICE_CREDENTIAL_ENVELOPE_KEY_BASE64:-}
      APP_DEVICE_CREDENTIAL_ENVELOPE_KEY_VERSION: ${APP_DEVICE_CREDENTIAL_ENVELOPE_KEY_VERSION:-local-v1}
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
    container_name: reboot-health-frontend
    depends_on:
      - backend
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:3000:80"
