spring:
  application:
    name: reboot-health
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reboot_health}
    username: ${SPRING_DATASOURCE_USERNAME:reboot_health}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-handlers-package: com.indigobyte.reboothealth.common.persistence
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  default-timezone: ${APP_DEFAULT_TIMEZONE:Asia/Shanghai}
  agent-runtime:
    base-url: ${APP_AGENT_RUNTIME_BASE_URL:http://localhost:8090}
    timeout-millis: ${APP_AGENT_RUNTIME_TIMEOUT_MILLIS:3000}
  device:
    bootstrap:
      generate: ${APP_DEVICE_BOOTSTRAP_GENERATE:false}
      code-ttl-minutes: ${APP_DEVICE_BOOTSTRAP_CODE_TTL_MINUTES:10}
      code-length: ${APP_DEVICE_BOOTSTRAP_CODE_LENGTH:24}
      max-failures: ${APP_DEVICE_BOOTSTRAP_MAX_FAILURES:5}
    auth:
      enabled: ${APP_DEVICE_AUTH_ENABLED:true}
    pairing:
      code-ttl-minutes: ${APP_DEVICE_PAIRING_CODE_TTL_MINUTES:10}
      code-length: ${APP_DEVICE_PAIRING_CODE_LENGTH:16}
    credential-envelope:
      key-base64: ${APP_DEVICE_CREDENTIAL_ENVELOPE_KEY_BASE64:}
      key-version: ${APP_DEVICE_CREDENTIAL_ENVELOPE_KEY_VERSION:local-v1}
      replay-ttl-minutes: ${APP_DEVICE_CREDENTIAL_ENVELOPE_REPLAY_TTL_MINUTES:30}
    access-token-ttl-minutes: ${APP_DEVICE_ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${APP_DEVICE_REFRESH_TOKEN_TTL_DAYS:30}
  safety:
    mode: conservative-defaults
