spring:
  application:
    name: reboot-health
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://host.docker.internal:5432/reboot_health}
    username: ${SPRING_DATASOURCE_USERNAME:reboot_health}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-handlers-package: com.indigobyte.reboothealth.common.persistence
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  ai:
    base-url: ${APP_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${APP_AI_API_KEY:}
    model: ${APP_AI_MODEL:gpt-4.1-mini}
  safety:
    mode: conservative-defaults
